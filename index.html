<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5GRS5L6BKV"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-5GRS5L6BKV');

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Food Library | Find Your Meal</title>

  <!-- Font Awesome for icons -->
  <script src="https://kit.fontawesome.com/14097a442a.js" crossorigin="anonymous"></script>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="mealApp.css" />
</head>

<body>
  <div id="full-body">
    <div id="header" class="container-fluid">
      <div id="nav" class="navbar navbar-dark fixed-top">
        <div class="container-fluid">
          <a href="https://docs.google.com/forms/d/e/1FAIpQLSdDOMsBIhdbElhvt4FmC8HCaGkHWMK2DcJQ5jAAk4ezQI9UOw/viewform" 
            class="btn btn-warning me-auto" 
            target="_blank">
            Feedback
          </a>


          <!-- Navbar Toggle Button -->
          <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar"
            aria-controls="offcanvasNavbar" onclick="showFavMealList()">
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- Offcanvas for Favorites -->
          <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar"
            aria-labelledby="offcanvasNavbarLabel">
            <div class="offcanvas-header bg-danger">
              <h5 class="offcanvas-title" id="offcanvasNavbarLabel" style="color:white;">Favourites</h5>
              <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div id="favourites-body" class="offcanvas-body d-flex justify-content-center flex-wrap">
              <div class="spinner-border text-success" role="status">
                <span class="sr-only">Loading...</span>
              </div>
            </div>
          </div>

        </div>
      </div> <!-- End Navbar -->

      <!-- Heading Section -->
      <div id="heading" class="container text-center">
        <h1>Find Your Hunger!!</h1>
      </div>

      <div class="d-flex justify-content-center align-items-center mt-3">
        <img src="logo.png.webp" alt="Food Library Logo" width="150">
      </div>

      <!-- Search Box -->
      <div id="search-section" class="container text-center mt-4">
        <div class="input-group">
          <button class="btn btn-light dropdown-toggle" type="button" id="searchDropdown" data-bs-toggle="dropdown" aria-expanded="false">
            Search By
          </button>
          <ul class="dropdown-menu" id="search-options">
            <li><a class="dropdown-item" href="#" onclick="setSearchType('Category')">Category</a></li>
            <li><a class="dropdown-item" href="#" onclick="setSearchType('Meal Name')">Meal Name</a></li>
            <li><a class="dropdown-item" href="#" onclick="setSearchType('Ingredient')">Ingredient</a></li>
          </ul>

          <span class="input-group-text" id="selectedSearchType">Category</span>

          <select id="category-dropdown" class="form-control" style="display: none;" onchange="showMealList()">
            <option value="">Select a category</option>
          </select>

          <input type="text" id="search-bar" class="form-control" placeholder="Search for meals..." oninput="autocompleteSearch()">

          <button class="btn btn-danger" type="button" onclick="performSearch()">
            <i class="fa fa-search"></i>
          </button>
        </div>

        <div id="autocomplete-dropdown" class="autocomplete-dropdown mt-2"></div>
      </div>

      <div id="heading-text" class="mt-3 text-center">
        <h5>Your Search Results:</h5>
      </div>
    </div>

    <div id="main" class="d-flex justify-content-around container flex-wrap mt-5"></div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->
  <script src="Mealapp.js"></script>

  

</body>
</html>
